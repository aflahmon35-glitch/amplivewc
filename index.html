<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMP LIVE</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">AMP LIVE</div>

  <div class="top-actions">
    <button class="btn whatsapp">WhatsApp Group</button>
    <button class="btn whatsapp">WhatsApp Channel</button>
    <button id="themeToggle" class="btn theme">🌙</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="yesterday">Yesterday</button>
  <button class="tab" data-tab="today">Today</button>
  <button class="tab" data-tab="tomorrow">Tomorrow</button>
</nav>

<main class="container">
  <div id="matchGrid" class="grid"></div>
</main>

<script src="script.js"></script>
</body>
</html>
