<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player - AMP LIVE</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">AMP LIVE</div>

  <div class="player-actions">
    <button onclick="goBack()" class="btn">⬅ Back</button>
    <button onclick="refreshStream()" class="btn">🔄</button>
    <button onclick="toggleFull()" class="btn">⛶</button>
    <button onclick="shareStream()" class="btn">Share</button>
  </div>
</header>

<main class="container">

  <div class="player-box">
    <iframe id="streamFrame" src="" allowfullscreen></iframe>
  </div>

  <button class="whatsapp-btn" onclick="openWhatsApp()">
    Join WhatsApp
  </button>

</main>

<script src="script.js"></script>

</body>
</html>
