<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match - AMP LIVE</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">AMP LIVE</div>
  <button id="themeToggle" class="btn theme">🌙</button>
</header>

<main class="container">

  <!-- MATCH HEADER -->
  <div class="match-header">

    <div class="match-teams">

      <div class="team">
        <img id="homeFlag" src="">
        <span id="homeTeam"></span>
      </div>

      <div class="vs-big">VS</div>

      <div class="team">
        <img id="awayFlag" src="">
        <span id="awayTeam"></span>
      </div>

    </div>

    <div class="match-meta">
      <p id="competition"></p>
      <p id="stadium"></p>
      <p id="kickoff"></p>
    </div>

    <div class="status-box">
      <span id="statusBadge" class="badge">UPCOMING</span>
      <div id="countdown"></div>
    </div>

  </div>

  <!-- STREAMS -->
  <div class="streams">
    <h3>Live Streams</h3>
    <div id="streamList" class="stream-grid"></div>
  </div>

</main>

<script src="script.js"></script>
</body>
</html>
